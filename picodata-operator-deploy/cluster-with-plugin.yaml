apiVersion: picodata.picodata.io/v1
kind: PicoclusterDB
metadata:
  name: picodata-flot
  namespace: picodata
spec:
  image:
    repository: git.picodata.io:5000/picodata/plugin/radix
    tag: "radix:1.0.0"
    pullPolicy: IfNotPresent

  imagePullSecrets:
    - name: picodata-registry

  clusterName: picodata-sample

  adminPassword:
    secretName: picodata-admin-secret
    key: password

  cluster:
    defaultReplicationFactor: 1
    defaultBucketCount: 16384

  tiers:
    # Тир-арбитр: участвует в raft-голосовании, не хранит пользовательские данные.
    # 2 репликасета, RF=1 → 2 пода.
    - name: arbiter
      replicas: 2
      replicationFactor: 1
      canVote: true
      securityContext:
        fsGroup: 1000
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: default-picodata-flot
                topologyKey: kubernetes.io/hostname
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: arbiter-picodata-flot
                topologyKey: kubernetes.io/hostname
      storage:
        size: 1Gi
      memtx:
        memory: "1G"
      pg:
        enabled: true
      log:
        level: info
        format: plain
      ingress:
        enabled: true
        host: picodata.example.com
        ingressClassName: nginx
        annotations:
          nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
        tls:
          - secretName: picodata-tls
            hosts:
              - picodata.example.com
      resources:
        requests:
          cpu: "1000m"
          memory: "1Gi"

    # Основной тир с плагином Radix.
    # 2 репликасета, RF=2 → 4 пода.
    # shareDir указывает на директорию внутри образа, где находится .so плагина.
    - name: default
      replicas: 3
      replicationFactor: 2
      canVote: false
      # disableAutoAntiAffinity: true  # раскомментировать для деплоя на одной ноде
      securityContext:
        fsGroup: 1000
      shareDir: /usr/share/picodata
      plugins:
        - name: radix
          version: "1.0.0"
          migrationContext:
            tier_for_db_0: "default"
            tier_for_db_1: "default"
            tier_for_db_2: "default"
            tier_for_db_3: "default"
            tier_for_db_4: "default"
            tier_for_db_5: "default"
            tier_for_db_6: "default"
            tier_for_db_7: "default"
            tier_for_db_8: "default"
            tier_for_db_9: "default"
            tier_for_db_10: "default"
            tier_for_db_11: "default"
            tier_for_db_12: "default"
            tier_for_db_13: "default"
            tier_for_db_14: "default"
            tier_for_db_15: "default"
            unlogged: "UNLOGGED"
          services:
            - name: radix
              listenerPort: 8082
      storage:
        size: 2Gi
      memtx:
        memory: "1G"
      pg:
        enabled: true
        ssl: false
      log:
        level: info
        format: plain
      resources:
        requests:
          cpu: "1000m"
          memory: "1Gi"
