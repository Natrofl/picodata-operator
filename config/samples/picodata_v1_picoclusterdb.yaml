apiVersion: picodata.picodata.io/v1
kind: PicoclusterDB
metadata:
  name: picodata-sample
  namespace: picodata
spec:
  image:
    repository: docker.binary.picodata.io
    tag: "picodata:master"
    pullPolicy: IfNotPresent

  clusterName: picodata-sample

  adminPassword:
    secretName: picodata-admin-secret
    key: password

  cluster:
    defaultReplicationFactor: 1
    defaultBucketCount: 3000

  # Overrides for the default Kubernetes probes.
  # By default the operator uses /api/v1/health/{startup,live,ready} HTTP endpoints.
  # Uncomment and adjust if you need different timings or a custom probe handler.
  #
  # startupProbe:
  #   httpGet:
  #     path: /api/v1/health/startup
  #     port: 8081
  #   periodSeconds: 30
  #   failureThreshold: 20
  #   timeoutSeconds: 3
  #
  # livenessProbe:
  #   httpGet:
  #     path: /api/v1/health/live
  #     port: 8081
  #   periodSeconds: 20
  #   failureThreshold: 3
  #   timeoutSeconds: 3
  #
  # readinessProbe:
  #   httpGet:
  #     path: /api/v1/health/ready
  #     port: 8081
  #   periodSeconds: 20
  #   failureThreshold: 3
  #   timeoutSeconds: 3

  tiers:
    # Тир-арбитр: участвует в raft-голосовании, не хранит пользовательские данные.
    # 2 реплики, replicationFactor=1 (каждая реплика — отдельный репликасет).
    - name: arbiter
      replicas: 2
      replicationFactor: 1
      canVote: true
      storage:
        size: 1Gi
      memtx:
        memory: "64M"
      vinyl:
        memory: "32M"
        cache: "16M"
      pg:
        enabled: false
      log:
        level: info
        format: plain
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "200m"
          memory: "256Mi"

    # Основной тир: хранит данные, replicationFactor=2 (каждый репликасет — 2 инстанса).
    # 2 репликасета × RF=2 = 4 пода.
    - name: default
      replicas: 2
      replicationFactor: 3
      canVote: false
      storage:
        size: 2Gi
      memtx:
        memory: "128M"
      vinyl:
        memory: "64M"
        cache: "32M"
      pg:
        enabled: true
        ssl: false
      log:
        level: info
        format: plain
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
