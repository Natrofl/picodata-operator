# This rule is not used by the project picodata-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over picodata.picodata.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: picodata-operator
    app.kubernetes.io/managed-by: kustomize
  name: picoclusterdb-admin-role
rules:
- apiGroups:
  - picodata.picodata.io
  resources:
  - picoclusterdbs
  verbs:
  - '*'
- apiGroups:
  - picodata.picodata.io
  resources:
  - picoclusterdbs/status
  verbs:
  - get
